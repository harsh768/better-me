<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#05060f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="SYSTEM" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" href="icon-192.png" />
<title>THE SYSTEM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05060f; --bg2:#0a0f24; --panel:rgba(14,22,52,0.72); --panel-solid:#0c1126;
  --cyan:#46d2ff; --cyan-dim:#1d6e8c; --blue:#3a7bff; --purple:#8c6eff;
  --gold:#ffd34d; --green:#42e2a0; --red:#ff5d6c; --txt:#dCEBFF; --muted:#7f93c4;
  --line:rgba(70,210,255,0.28); --glow:0 0 14px rgba(70,210,255,0.55);
  --safe-top:env(safe-area-inset-top); --safe-bot:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:'Rajdhani','Segoe UI',system-ui,sans-serif;overscroll-behavior-y:contain;}
body{min-height:100vh;
  background:
   radial-gradient(1200px 600px at 50% -10%, rgba(58,123,255,0.18), transparent 60%),
   radial-gradient(900px 500px at 90% 110%, rgba(140,110,255,0.14), transparent 60%),
   linear-gradient(180deg,#05060f 0%, #070a18 100%);
  background-attachment:fixed;}
h1,h2,h3,.font-d{font-family:'Orbitron',sans-serif;letter-spacing:1px;}
.hidden{display:none !important;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
::-webkit-scrollbar{width:0;height:0;}

/* ---- App shell ---- */
#app{max-width:520px;margin:0 auto;padding:calc(var(--safe-top) + 8px) 14px calc(86px + var(--safe-bot)) 14px;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.brand{display:flex;align-items:center;gap:9px;}
.brand .mark{width:26px;height:26px;filter:drop-shadow(0 0 6px rgba(70,210,255,.8));}
.brand b{font-family:'Orbitron';font-size:15px;letter-spacing:3px;color:#eaf4ff;}
.icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);
  background:rgba(20,30,66,.5);display:grid;place-items:center;font-size:17px;color:var(--cyan);}

/* ---- panels ---- */
.panel{position:relative;background:var(--panel);border:1px solid var(--line);
  border-radius:14px;padding:14px;margin-bottom:13px;backdrop-filter:blur(6px);
  box-shadow:0 0 0 1px rgba(70,210,255,.05), inset 0 0 24px rgba(58,123,255,.06);}
.panel::before,.panel::after{content:"";position:absolute;width:12px;height:12px;border:2px solid var(--cyan);opacity:.65;}
.panel::before{top:-1px;left:-1px;border-right:none;border-bottom:none;border-radius:4px 0 0 0;}
.panel::after{bottom:-1px;right:-1px;border-left:none;border-top:none;border-radius:0 0 4px 0;}
.panel-title{font-family:'Orbitron';font-size:12px;letter-spacing:2px;color:var(--cyan);
  text-transform:uppercase;margin:0 0 10px;display:flex;align-items:center;gap:8px;}
.panel-title:before{content:"◆";font-size:9px;color:var(--purple);}

/* ---- player header ---- */
.hero{background:linear-gradient(135deg, rgba(20,32,78,.85), rgba(10,14,38,.9));}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.rankbadge{display:flex;flex-direction:column;align-items:center;gap:2px;}
.rankbadge .r{font-family:'Orbitron';font-weight:900;font-size:30px;line-height:1;
  width:58px;height:58px;border-radius:12px;display:grid;place-items:center;
  border:1.5px solid var(--cyan);color:#eafaff;background:radial-gradient(circle at 50% 30%, rgba(70,210,255,.35), rgba(10,16,40,.6));
  box-shadow:var(--glow);}
.rankbadge small{font-size:9px;letter-spacing:2px;color:var(--muted);}
.hero-name{font-family:'Orbitron';font-size:17px;color:#fff;margin:0;}
.hero-title{font-size:13px;color:var(--cyan);font-weight:600;margin-top:2px;}
.hero-level{font-size:12px;color:var(--muted);margin-top:4px;}
.lvlnum{color:var(--gold);font-weight:700;font-family:'Orbitron';}
.xpwrap{margin-top:12px;}
.barlabel{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px;letter-spacing:1px;}
.bar{height:11px;border-radius:8px;background:rgba(5,10,28,.8);border:1px solid var(--line);overflow:hidden;position:relative;}
.bar>i{display:block;height:100%;border-radius:8px;background:linear-gradient(90deg,var(--blue),var(--cyan));
  box-shadow:0 0 10px rgba(70,210,255,.7);transition:width .5s cubic-bezier(.2,.8,.2,1);}
.hero-stats{display:flex;gap:10px;margin-top:13px;}
.chip{flex:1;text-align:center;background:rgba(7,12,32,.7);border:1px solid var(--line);border-radius:10px;padding:8px 4px;}
.chip b{display:block;font-family:'Orbitron';font-size:16px;}
.chip span{font-size:10px;color:var(--muted);letter-spacing:1px;}
.chip.gold b{color:var(--gold);} .chip.streak b{color:var(--red);} .chip.done b{color:var(--green);}

/* ---- quests ---- */
.q-head{display:flex;justify-content:space-between;align-items:center;}
.q-progress{font-size:11px;color:var(--muted);letter-spacing:1px;}
.quest{display:flex;align-items:flex-start;gap:11px;padding:11px 4px;border-bottom:1px dashed rgba(70,210,255,.14);}
.quest:last-child{border-bottom:none;}
.qcheck{flex:none;width:26px;height:26px;border-radius:7px;border:1.5px solid var(--cyan-dim);
  background:rgba(7,12,32,.6);display:grid;place-items:center;font-size:15px;color:transparent;
  transition:all .18s;margin-top:1px;}
.quest.done .qcheck{background:linear-gradient(135deg,var(--blue),var(--cyan));border-color:var(--cyan);color:#04122a;box-shadow:var(--glow);}
.qbody{flex:1;min-width:0;}
.qtitle{font-size:15px;font-weight:600;line-height:1.2;}
.quest.done .qtitle{color:var(--muted);text-decoration:line-through;text-decoration-color:rgba(127,147,196,.5);}
.qmeta{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.35;}
.qtags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.tag{font-size:9.5px;letter-spacing:1px;padding:2px 7px;border-radius:20px;border:1px solid var(--line);color:var(--cyan);background:rgba(70,210,255,.08);}
.tag.xp{color:var(--gold);border-color:rgba(255,211,77,.4);background:rgba(255,211,77,.08);}
.tag.mand{color:var(--red);border-color:rgba(255,93,108,.4);background:rgba(255,93,108,.08);}
.tag.stat{color:var(--purple);border-color:rgba(140,110,255,.4);background:rgba(140,110,255,.08);}
.qexp{font-size:12px;color:#a9c0ee;margin-top:7px;line-height:1.45;padding:9px 11px;background:rgba(5,10,28,.55);border-left:2px solid var(--purple);border-radius:0 8px 8px 0;white-space:pre-line;}
.expbtn{font-size:11px;color:var(--cyan);margin-top:5px;letter-spacing:1px;}

/* ---- stat bars ---- */
.statrow{margin-bottom:13px;}
.statrow .barlabel b{color:var(--txt);font-family:'Orbitron';font-size:12px;}
.statrow .barlabel .v{color:var(--cyan);font-family:'Orbitron';}
.stat-desc{font-size:10.5px;color:var(--muted);margin-top:3px;}
.bar.str>i{background:linear-gradient(90deg,#ff7a45,#ffb13d);box-shadow:0 0 10px rgba(255,140,60,.6);}
.bar.vit>i{background:linear-gradient(90deg,#ff5d6c,#ff95a6);box-shadow:0 0 10px rgba(255,93,108,.6);}
.bar.agi>i{background:linear-gradient(90deg,#42e2a0,#9affd0);box-shadow:0 0 10px rgba(66,226,160,.6);}
.bar.int>i{background:linear-gradient(90deg,#3a7bff,#46d2ff);box-shadow:0 0 10px rgba(70,210,255,.6);}
.bar.per>i{background:linear-gradient(90deg,#8c6eff,#c3b2ff);box-shadow:0 0 10px rgba(140,110,255,.6);}
.bar.sen>i{background:linear-gradient(90deg,#ffd34d,#fff0b0);box-shadow:0 0 10px rgba(255,211,77,.6);}

/* ---- shop ---- */
.reward{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;background:rgba(7,12,32,.5);}
.reward .ic{font-size:24px;width:42px;height:42px;display:grid;place-items:center;border-radius:10px;background:rgba(70,210,255,.08);border:1px solid var(--line);}
.reward .info{flex:1;min-width:0;}
.reward .rn{font-size:15px;font-weight:600;}
.reward .rc{font-size:12px;color:var(--gold);font-family:'Orbitron';margin-top:2px;}
.redeem{padding:8px 14px;border-radius:9px;font-family:'Orbitron';font-size:11px;letter-spacing:1px;
  border:1px solid var(--cyan);color:var(--cyan);background:rgba(70,210,255,.1);}
.redeem:disabled{opacity:.35;border-color:var(--muted);color:var(--muted);}
.reward .del{color:var(--red);font-size:18px;padding:4px;}

/* ---- buttons ---- */
.btn{display:block;width:100%;text-align:center;padding:13px;border-radius:11px;font-family:'Orbitron';
  font-size:13px;letter-spacing:1px;border:1px solid var(--cyan);color:#eafaff;
  background:linear-gradient(135deg,rgba(58,123,255,.35),rgba(70,210,255,.2));box-shadow:var(--glow);}
.btn.ghost{background:rgba(10,16,40,.5);box-shadow:none;border-color:var(--line);color:var(--cyan);}
.btn.danger{border-color:var(--red);color:var(--red);background:rgba(255,93,108,.08);box-shadow:none;}
.btn.sm{padding:9px;font-size:11px;}

/* ---- log / calendar ---- */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:6px;}
.cal .dow{text-align:center;font-size:9px;color:var(--muted);letter-spacing:1px;}
.cell{aspect-ratio:1;border-radius:7px;border:1px solid rgba(70,210,255,.14);display:grid;place-items:center;
  font-size:10px;color:var(--muted);background:rgba(7,12,32,.4);position:relative;}
.cell.full{background:linear-gradient(135deg,rgba(58,123,255,.5),rgba(70,210,255,.35));color:#eafaff;border-color:var(--cyan);box-shadow:0 0 6px rgba(70,210,255,.4);}
.cell.partial{background:rgba(140,110,255,.18);border-color:rgba(140,110,255,.4);color:#cdbcff;}
.cell.today{outline:2px solid var(--gold);outline-offset:1px;}
.wlog{display:flex;gap:8px;margin-top:8px;}
.wlog input{flex:1;}
.input,input,select,textarea{width:100%;padding:11px;border-radius:10px;background:rgba(5,10,28,.7);
  border:1px solid var(--line);color:var(--txt);font-family:inherit;font-size:15px;outline:none;}
input:focus,textarea:focus,select:focus{border-color:var(--cyan);box-shadow:var(--glow);}
label{font-size:11px;color:var(--muted);letter-spacing:1px;display:block;margin:10px 0 4px;text-transform:uppercase;}
.row2{display:flex;gap:10px;} .row2>*{flex:1;}

/* ---- codex ---- */
.codex-tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;margin-bottom:4px;}
.codex-tabs button{flex:none;padding:8px 13px;border-radius:20px;font-size:11px;letter-spacing:1px;
  border:1px solid var(--line);color:var(--muted);background:rgba(7,12,32,.5);font-family:'Orbitron';}
.codex-tabs button.active{color:#04122a;background:linear-gradient(135deg,var(--blue),var(--cyan));border-color:var(--cyan);}
.cx h4{font-family:'Orbitron';font-size:13px;color:var(--cyan);margin:16px 0 7px;letter-spacing:1px;}
.cx h4:first-child{margin-top:2px;}
.cx p,.cx li{font-size:13.5px;line-height:1.55;color:#c2d4f5;}
.cx ul{margin:5px 0;padding-left:18px;} .cx li{margin-bottom:4px;}
.cx b{color:#eaf4ff;} .cx .hl{color:var(--gold);}
.cx .note{font-size:12px;color:var(--muted);background:rgba(255,93,108,.07);border:1px solid rgba(255,93,108,.25);
  border-radius:9px;padding:9px 11px;margin:9px 0;}
.cx table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12.5px;}
.cx td,.cx th{border:1px solid var(--line);padding:6px 8px;text-align:left;}
.cx th{color:var(--cyan);font-family:'Orbitron';font-size:10px;letter-spacing:1px;}

/* ---- bottom nav ---- */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;justify-content:center;
  padding-bottom:var(--safe-bot);background:linear-gradient(180deg,transparent,#05060f 30%);}
.nav-inner{display:flex;width:100%;max-width:520px;margin:0 14px;background:rgba(10,16,40,.92);
  border:1px solid var(--line);border-radius:16px;backdrop-filter:blur(10px);box-shadow:0 -2px 20px rgba(0,0,0,.5);}
.nav button{flex:1;padding:10px 0 9px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);}
.nav button .ni{font-size:18px;line-height:1;}
.nav button .nl{font-size:9px;letter-spacing:1px;font-family:'Orbitron';}
.nav button.active{color:var(--cyan);}
.nav button.active .ni{filter:drop-shadow(0 0 6px rgba(70,210,255,.9));}

/* ---- modal / system message ---- */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(2,4,12,.82);backdrop-filter:blur(4px);
  display:grid;place-items:center;padding:22px;animation:fade .25s;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sys{width:100%;max-width:440px;border:1.5px solid var(--cyan);border-radius:6px;
  background:linear-gradient(180deg,rgba(8,14,38,.97),rgba(5,9,24,.98));
  box-shadow:0 0 40px rgba(70,210,255,.4), inset 0 0 40px rgba(58,123,255,.08);
  padding:22px;animation:pop .3s cubic-bezier(.2,1.3,.4,1);position:relative;max-height:86vh;overflow-y:auto;}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.sys::before,.sys::after{content:"";position:absolute;width:16px;height:16px;border:2px solid var(--cyan);}
.sys::before{top:-2px;left:-2px;border-right:none;border-bottom:none;}
.sys::after{bottom:-2px;right:-2px;border-left:none;border-top:none;}
.sys-h{font-family:'Orbitron';text-align:center;color:var(--cyan);letter-spacing:3px;font-size:13px;
  border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:14px;text-shadow:var(--glow);}
.sys-big{font-family:'Orbitron';font-size:24px;text-align:center;color:#fff;text-shadow:0 0 18px rgba(70,210,255,.9);margin:8px 0;}
.sys p{font-size:14px;line-height:1.55;color:#c8d8f7;}
.sys .center{text-align:center;}
.notif{position:fixed;left:50%;top:calc(var(--safe-top) + 14px);transform:translateX(-50%);z-index:120;
  background:rgba(8,14,38,.96);border:1px solid var(--cyan);border-radius:10px;padding:11px 16px;
  box-shadow:var(--glow);font-family:'Orbitron';font-size:12px;letter-spacing:1px;color:var(--cyan);
  display:flex;align-items:center;gap:8px;animation:drop .4s, fade .3s;max-width:90vw;}
@keyframes drop{from{transform:translate(-50%,-30px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
.fade-up{animation:fade .3s;}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:14px;}
.tiny{font-size:11px;color:var(--muted);}
.spark{display:flex;align-items:flex-end;gap:3px;height:60px;margin-top:8px;}
.spark .b{flex:1;background:linear-gradient(180deg,var(--cyan),var(--blue));border-radius:3px 3px 0 0;min-height:3px;opacity:.85;}
</style>
</head>
<body>
<div id="notif-host"></div>
<div id="app">
  <div class="topbar">
    <div class="brand">
      <img class="mark" src="icon-192.png" alt=""/>
      <b>THE SYSTEM</b>
    </div>
    <button class="icon-btn" onclick="openSettings()">⚙</button>
  </div>
  <div id="view"></div>
</div>

<nav class="nav"><div class="nav-inner" id="nav">
  <button data-t="home" class="active"><span class="ni">⬢</span><span class="nl">HOME</span></button>
  <button data-t="stats"><span class="ni">▤</span><span class="nl">STATS</span></button>
  <button data-t="shop"><span class="ni">◈</span><span class="nl">SHOP</span></button>
  <button data-t="log"><span class="ni">▦</span><span class="nl">LOG</span></button>
  <button data-t="codex"><span class="ni">❖</span><span class="nl">CODEX</span></button>
</div></nav>

<div id="modal-host"></div>

<script>
/* ============================================================
   THE SYSTEM — a Solo-Leveling life RPG  (single-file PWA)
   ============================================================ */
const $ = (s,el=document)=>el.querySelector(s);
const STORE='system_save_v1';
const todayStr=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const dow=()=>new Date().getDay(); // 0 Sun .. 6 Sat
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}

/* ---------- STAT DEFINITIONS ---------- */
const STATS={
  STR:{name:'Strength', cls:'str', desc:'Resistance training — building the body.'},
  VIT:{name:'Vitality', cls:'vit', desc:'Nutrition, hydration & sleep — fuelling the heal.'},
  AGI:{name:'Agility',  cls:'agi', desc:'Cardio, steps & mobility — conditioning.'},
  INT:{name:'Intellect',cls:'int', desc:'Study — OSCP, bug bounty & AI security.'},
  PER:{name:'Perception',cls:'per',desc:'Work mastery — becoming the best engineer.'},
  SEN:{name:'Sense',    cls:'sen', desc:'Skincare, physio & recovery — self-care.'},
};

/* ---------- PROGRAM: workout split by weekday ---------- */
/* shoulder-safe heal phase: lower body + core + low-impact cardio, NO pressing/overhead/planks */
const WORKOUTS={
  1:{key:'Lower A — Quad Focus',stat:'STR',xp:55,gold:35,
     ex:`Leg Press — 4×10\nHack Squat / Machine Squat — 3×12\nLeg Extension — 3×15\nWalking Lunges (dumbbells at sides) — 3×12/leg\nSeated Calf Raise — 4×15\n\n⚠ Bar held low/at sides only. No front-rack, no overhead, no bar on upper back if it strains the shoulder — use the hack/leg-press machine instead.`},
  2:{key:'Core + Zone-2 Cardio',stat:'AGI',xp:50,gold:30,
     ex:`Stationary bike / incline walk — 30–40 min easy (can talk while doing it)\nLying leg raises — 3×15\nDead bug — 3×12/side\nMachine crunch (or cable crunch seated) — 3×15\nBicycle crunch — 3×20\n\n⚠ Skip planks & hanging leg raises for now (they load the shoulder).`},
  3:{key:'Lower B — Posterior Chain',stat:'STR',xp:55,gold:35,
     ex:`Hip Thrust (machine or barbell on hips) — 4×10\nSeated Leg Curl — 4×12\nMachine RDL / Light DB RDL — 3×12\nGlute Kickback (cable/machine) — 3×15/leg\nStanding Calf Raise (machine) — 4×15\n\n⚠ Keep RDL light; grip-only load is fine but stop if shoulder pulls.`},
  4:{key:'Cardio + Mobility',stat:'AGI',xp:45,gold:30,
     ex:`Incline treadmill walk — 35–45 min (incline 8–12, brisk)\nLower-body mobility / stretching — 10 min\nOptional easy cycle\n\nActive recovery day. Keep heart rate moderate, protect the shoulder.`},
  5:{key:'Lower C — Full Legs',stat:'STR',xp:55,gold:35,
     ex:`Leg Press — 4×12\nBulgarian Split Squat (DBs at sides) — 3×10/leg\nLeg Curl — 3×12\nLeg Extension — 3×15\nCalf Raise — 4×20`},
  6:{key:'Long Walk / Active Recovery',stat:'AGI',xp:40,gold:25,
     ex:`Outdoor walk 45–60 min OR easy cycle.\nGentle full-body stretch.\nGet sunlight — helps sleep + mood.`},
  0:{key:'Rest + Weekly Review',stat:'SEN',xp:35,gold:25,
     ex:`Full rest from training.\nDo your weekly review (see CODEX → Operating System).\nMeal-prep protein for the week.\nPlan next week's study targets.`},
};

/* ---------- recurring daily quests ---------- */
function studyBlock(week){
  // week 1-4: OSCP intensive ; 5+ : bug bounty + AI security
  if(week<=4){
    const mins=[60,75,90,105][Math.min(week-1,3)];
    return {title:`OSCP Lab Block — ${mins} min`,stat:'INT',xp:65,gold:45,mand:true,
      exp:`OSCP month — your lab subscription is LIVE, so extract maximum value.\nToday: 1 PWK module/video → its exercises → then attack 1 lab box end-to-end.\nMethodology loop: enumerate (nmap -p- → service enum) → find a foothold → get a shell → privesc (linux & windows) → loot.\nKeep a notes file per box (Obsidian/CherryTree). This note-taking IS the skill.\nWeek focus: W1 enum+web foothold · W2 linux privesc · W3 windows privesc · W4 AD basics + revisit weak spots.`};
  }
  const mins = Math.min(60+ (week-5)*10, 120);
  return {title:`Bug Bounty / AI-Sec — ${mins} min`,stat:'INT',xp:60,gold:40,mand:true,
    exp:`Phase 2 — free & high-leverage.\nPrimary: PortSwigger Web Security Academy — finish one topic's labs (SQLi → XSS → access control → SSRF → auth → CSRF → SSTI...).\nThen: pick a public Bugcrowd/HackerOne program, do recon (subdomain enum, content discovery), hunt 30 min.\nWeekly: 1 session on AI/LLM security — OWASP LLM Top 10, prompt injection, testing AI features (your edge, since you love AI tools).\nLog every new concept in a "today I learned" note.`};
}

function buildDailyQuests(week){
  return [
    {id:'sk_am',title:'Morning Skincare + SPF',stat:'SEN',xp:15,gold:10,mand:false,
      exp:`Cleanser → moisturiser → sunscreen (SPF 50, reapply if outdoors).\n30 seconds. Sunscreen is the single highest-ROI skincare step — do it daily.`},

function xpForLevel(l){ return 80 + (l-1)*60; }            // xp needed to clear level l
function levelInfo(totalXp){
  let l=1, rem=totalXp;
  while(rem>=xpForLevel(l)){ rem-=xpForLevel(l); l++; }
  return {level:l, into:rem, need:xpForLevel(l)};
}
function rankFor(l){
  if(l>=50)return 'S'; if(l>=35)return 'A'; if(l>=20)return 'B';
  if(l>=10)return 'C'; if(l>=5)return 'D'; return 'E';
}
function titleFor(l){
  if(l>=50)return 'Sovereign'; if(l>=35)return 'Shadow Monarch';
  if(l>=20)return 'Elite Hunter'; if(l>=10)return 'Awakened';
  if(l>=5)return 'Rising Hunter'; return 'Player';
}

function dayRecord(d=todayStr()){ if(!S.history[d])S.history[d]={done:[],full:false}; return S.history[d]; }
function isDone(id){ return dayRecord().done.includes(id); }

/* ---------- quest toggle ---------- */
function toggleQuest(q){
  const rec=dayRecord();
  const i=rec.done.indexOf(q.id);
  if(i>=0){ // un-complete
    rec.done.splice(i,1);
    S.totalXp=Math.max(0,S.totalXp-q.xp);
    S.gold=Math.max(0,S.gold-q.gold);
    S.stats[q.stat]=Math.max(0,S.stats[q.stat]-1);
    S.totalCompleted=Math.max(0,S.totalCompleted-1);
    recomputeFull();
    save(); render();
  } else {
    const before=levelInfo(S.totalXp).level;
    rec.done.push(q.id);
    S.totalXp+=q.xp; S.gold+=q.gold; S.stats[q.stat]+=1; S.totalCompleted+=1;
    recomputeFull();
    save();
    if(navigator.vibrate)navigator.vibrate(15);
    const after=levelInfo(S.totalXp).level;
    if(after>before){ render(); levelUpMsg(after); }
    else { toast(`+${q.xp} XP  ·  +${q.gold} G`); render(); }
    checkDayComplete();
  }
}
function recomputeFull(){
  const qs=todaysQuests().filter(q=>q.mand);
  const rec=dayRecord();
  rec.full = qs.every(q=>rec.done.includes(q.id));
}
function checkDayComplete(){
  if(dayRecord().full){
    const todays=todaysQuests();

    if(!dayRecord().bonus){
      dayRecord().bonus=true; S.totalXp+=50; S.gold+=40; save();
      sysModal('DAILY QUEST COMPLETE',
        `<div class="sys-big">ALL CLEAR</div>

         <span class="hl" style="color:var(--gold)">Bonus: +50 XP · +40 Gold</span></p>
         <p class="center tiny">Streak protected. The penalty zone stays shut. Rest well, Hunter.</p>`,
        'CLOSE');
      render();
    }
  }
}

/* ---------- streaks (recomputed from history) ---------- */
function streakInfo(){
  // count consecutive days up to today (or yesterday) that were "full"
  let cur=0; let d=new Date();
  // if today not full yet, start from yesterday so streak isn't shown broken mid-day
  if(!(S.history[todayStr()]&&S.history[todayStr()].full)) d.setDate(d.getDate()-1);
  while(true){
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(S.history[ds]&&S.history[ds].full){cur++; d.setDate(d.getDate()-1);} else break;
  }
  // longest
  let longest=0,run=0;
  const dates=Object.keys(S.history).sort();
  let prev=null;
  for(const ds of dates){
    if(!S.history[ds].full){run=0;prev=ds;continue;}
    if(prev && daysBetween(prev,ds)===1 && S.history[prev].full) run++; else run=1;
    longest=Math.max(longest,run); prev=ds;
  }
  return {cur,longest:Math.max(longest,cur)};
}

function drawWeightChart(){
  const c=$('#wchart'); if(!c)return;
  const dpr=window.devicePixelRatio||1; const w=c.clientWidth, h=120;
  c.width=w*dpr; c.height=h*dpr; const x=c.getContext('2d'); x.scale(dpr,dpr);
  const data=S.weights.slice(-30);
  if(data.length<1){x.fillStyle='#7f93c4';x.font='12px Rajdhani';x.fillText('Log your weight to see the trend.',10,60);return;}
  const ys=data.map(d=>d.kg).concat([S.profile.goalWeight]);
  let mn=Math.min(...ys)-1, mx=Math.max(...ys)+1; if(mx-mn<2){mx+=1;mn-=1;}
  const px=i=>data.length<2?w/2:10+i*(w-20)/(data.length-1);
  const py=v=>10+(mx-v)/(mx-mn)*(h-20);
  // goal line
  x.strokeStyle='rgba(255,211,77,.5)';x.setLineDash([5,4]);x.beginPath();
  x.moveTo(0,py(S.profile.goalWeight));x.lineTo(w,py(S.profile.goalWeight));x.stroke();x.setLineDash([]);
  // line
  x.strokeStyle='#46d2ff';x.lineWidth=2;x.beginPath();
  data.forEach((d,i)=>{i?x.lineTo(px(i),py(d.kg)):x.moveTo(px(i),py(d.kg));});x.stroke();
  x.fillStyle='#46d2ff';data.forEach((d,i)=>{x.beginPath();x.arc(px(i),py(d.kg),3,0,7);x.fill();});
}

<li>Add a little weight or 1–2 reps when a set feels easy. Slow and steady.</li>
<li>Steps are king for fat loss: <b>10k/day</b>, zero shoulder cost.</li>
</ul>
<h4>After clearance (~Month 3)</h4>
<p>Reintroduce upper body <i>gradually</i> — start with light machine rows/chest press and band work as your physio clears each movement, then build back to a full push/pull/legs split.</p>`,

nutri:`<h4>Nutrition — Lean Down (Egg + Veg)</h4>
<p>At ~90 kg / 6 ft, a steady deficit drops fat without wrecking energy. Don't crash — aim for <b>~0.5 kg/week</b>.</p>
<table>
<tr><th>Target</th><th>Value</th></tr>
<tr><td>Calories</td><td>~1,800–2,000 kcal/day</td></tr>
<tr><td>Protein</td><td>~150 g/day (key for fat loss + holding muscle)</td></tr>
<tr><td>Water</td><td>3 L/day</td></tr>
</table>
<p>Your two-meal pattern (12:30 + 9) is basically intermittent fasting — great for a deficit. Just make both meals protein-forward.</p>
<h4>Protein sources (egg + veg)</h4>
<p>Eggs & whites, paneer, tofu, Greek yogurt/curd, dal, rajma, chana, soya chunks (huge protein), milk, whey shake. A scoop of whey + soya chunks makes hitting 150 g easy.</p>
<h4>Plate rule (no counting needed to start)</h4>
<ul>
<li>½ plate veg/salad, ¼ protein, ¼ carbs (roti/rice — measured).</li>
<li>Protein at <b>every</b> meal. A palm-sized+ portion.</li>
<li>Limit: fried food, sweets, sugary drinks, late-night snacking.</li>
<li>One earned cheat meal/week (buy it with gold).</li>
</ul>
<h4>Sample day (~1,900 kcal, ~150 g protein)</h4>
<ul>
<li><b>Meal 1 (12:30):</b> 3 eggs + 100 g paneer bhurji, 2 roti, big salad, bowl of curd.</li>
<li><b>Snack:</b> whey shake + handful nuts (or fruit).</li>
<li><b>Dinner (9):</b> 150 g soya/paneer or 4-egg dish + dal + 1 cup rice/2 roti + sabzi.</li>
</ul>
<p class="note">Adjust portions to the scale: if weight isn't trending down over 2 weeks, trim carbs/oil slightly. If you're exhausted, eat a bit more protein/veg, not sugar.</p>`,

recover:`<h4>Recovery — where the gains actually happen</h4>
<h4>Shoulder physio</h4>
<ul>
<li>Do your physio's prescribed routine <b>1–2×/day</b> — this is a mandatory quest.</li>
<li>Typical early-stage work (only as your physio clears it): pendulum swings, isometric holds, assisted ROM, then light band ext. rotation.</li>
<li><b>Never push into sharp pain.</b> Consistency &gt; intensity here. This is the fastest path back to heavy lifting.</li>
</ul>
<h4>Sleep — the cheat code</h4>
<p>You currently sleep ~2–3 am. We shift bedtime <b>~20 min earlier each week</b> toward ~12:30 am / 8 am wake. The app shows this week's target on Home.</p>
<ul>
<li>No screens 30 min before bed (the night-skincare quest is a good cue to start winding down).</li>
<li>Dark, cool room. Same wake time daily — even weekends — anchors the rhythm.</li>
<li>Sleep drives shoulder healing, fat-loss hormones, focus and mood. It's not optional.</li>
</ul>`,

skin:`<h4>Skincare — simple, daily, high-ROI</h4>
<p>Confidence isn't only the scale — clear skin and a routine you control compounds fast. Keep it minimal so you actually stick to it.</p>
<h4>Morning</h4>
<ol><li>Gentle cleanser (splash of water is fine if in a rush)</li>
<li>Lightweight moisturiser</li>
<li><b>Sunscreen SPF 50</b> — the single best thing you can do for your skin. Daily, even indoors near windows.</li></ol>
<h4>Night</h4>
<ol><li>Cleanser (remove the day's oil/sweat)</li>
<li>Treatment <i>(add after 2–3 weeks of habit):</i> niacinamide serum, and a gentle retinoid 2–3 nights/week for texture</li>
<li>Moisturiser</li></ol>
<h4>Basics that matter more than products</h4>
<ul><li>Don't pick at skin. Clean pillowcase weekly. Hydrate (your 3 L quest).</li>
<li>Sleep & lower sugar visibly improve skin — your other quests are doing double duty.</li></ul>`,

study:`<h4>Study Path — your biggest lever against "I don't know anything"</h4>
<p>Two phases. The app's <b>study quest auto-switches</b> based on your program week.</p>
<h4>Phase 1 — Month 1: OSCP (subscription is LIVE — use it)</h4>
<p>You paid for it and have ~1 month of lab access left. That access is the expensive part, so we extract maximum value now. You likely won't sit the exam this month — that's fine. The goal is to <b>burn through labs and build methodology</b>.</p>
<ul>
<li><b>Daily loop:</b> 1 PWK module/video → its exercises → attack 1 lab box end-to-end.</li>
<li><b>Methodology:</b> full-port nmap → service enum → foothold → shell → privesc (Linux & Windows) → loot. Take detailed notes per box (this note-taking <i>is</i> the skill).</li>
<li><b>Week focus:</b> W1 enum + web footholds · W2 Linux privesc · W3 Windows privesc · W4 Active Directory basics + revisit weak spots.</li>
<li>If you fall in love with it, extend the sub later and target the exam properly (it needs ~2–3 focused months).</li>
</ul>
<h4>Phase 2 — Month 2+: Bug Bounty + AI Security (free & high-leverage)</h4>
<ul>
<li><b>PortSwigger Web Security Academy</b> (free, best-in-class): work topic by topic — SQLi → XSS → access control → SSRF → auth → CSRF → SSTI → deserialization. Do the labs, don't just read.</li>
<li><b>Practice:</b> pick a public <b>HackerOne/Bugcrowd</b> program, learn recon (subdomain enum, content discovery with ffuf, Burp Suite), hunt 30 min/session. Read disclosed reports — they teach real patterns.</li>
<li><b>AI / LLM security (your edge):</b> 1 session/week on the <b>OWASP LLM Top 10</b>, prompt injection, jailbreaks, and testing AI features in apps. You love AI tools — this is a fast-growing niche where you can stand out at Navi and in bounties.</li>
</ul>
<h4>The habit that beats talent</h4>
<p class="note">Write ONE "today I learned" note every single day (the work quest). In 90 days you'll have 90 concrete things you didn't know before. That is the cure for feeling like you don't know anything — proof, not vibes.</p>`,

work:`<h4>Work & Mind — become the best security engineer</h4>
<h4>At the job</h4>
<ul>
<li><b>One deep-work block daily</b> (60–90 min, phone away) on your hardest/most important task. This is where reputation is built.</li>
<li><b>Log 1 learning daily.</b> Over a quarter this becomes a visible body of knowledge — bring it to 1:1s and reviews.</li>
<li>Volunteer for the scary task occasionally. Growth lives just past "I'm not sure I can."</li>
<li>Connect your study to work: OSCP/bug-bounty skills → offer to help with internal pentests, threat modeling, or AI-feature security reviews.</li>
</ul>
<h4>On confidence</h4>
<ul>
<li>"I don't know anything" is impostor feeling, not fact — you have 3 years of shipping. The fix is <b>evidence</b>: stats going up, streaks, learning notes, weight trending down. This app manufactures that evidence daily.</li>
<li>Compare yourself to last month's you, not to Twitter experts.</li>
</ul>
<h4>Startup / exploration</h4>
<ul>
<li>Keep it to a <b>weekly slot</b> (Sunday). Jot ideas, build tiny prototypes, talk to people. Don't let it crowd out the fundamentals you're building now.</li>
<li>Security + AI is a great founder lane — the study path doubles as market research.</li>
</ul>`,
};

/* ============================================================
   MODALS / SETTINGS / NOTIFS
   ============================================================ */
function sysModal(head,html,btn='OK',onClose){
  const host=$('#modal-host');
  host.innerHTML=`<div class="overlay" id="ov"><div class="sys">
    <div class="sys-h">▌ SYSTEM ▐ ${head}</div>${html}
    <button class="btn" style="margin-top:16px" id="ovbtn">${btn}</button>
  </div></div>`;
  $('#ovbtn').onclick=()=>{host.innerHTML='';if(onClose)onClose();};
}
function levelUpMsg(l){
  sysModal('NOTIFICATION',
    `<div class="center" style="color:var(--gold);letter-spacing:4px;font-family:Orbitron;font-size:12px">⟨ LEVEL UP ⟩</div>
     <div class="sys-big">LEVEL ${l}</div>
     <p class="center">Rank <b style="color:var(--cyan)">${rankFor(l)}</b> · ${titleFor(l)}<br>
     You have grown stronger. The path continues.</p>`,'CONTINUE');
  if(navigator.vibrate)navigator.vibrate([30,60,30,60,80]);
}
function toast(msg){
  const h=$('#notif-host');
  const el=document.createElement('div'); el.className='notif'; el.innerHTML='◆ '+msg;
  h.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .4s';},1300);
  setTimeout(()=>el.remove(),1750);
}
function openSettings(){
  const p=S.profile;
  sysModal('SETTINGS',`
    <label>Hunter name</label><input id="s_name" value="${p.name||''}">
    <div class="row2">
      <div><label>Goal weight (kg)</label><input id="s_goal" type="number" value="${p.goalWeight}"></div>
      <div><label>Height (cm)</label><input id="s_h" type="number" value="${p.height}"></div>
    </div>
    <label>Program start date</label><input id="s_start" type="date" value="${p.startDate}">
    <p class="tiny" style="margin-top:6px">Week ${programWeek()} · workout split & study phase advance automatically from this date.</p>
    <button class="btn" style="margin-top:14px" onclick="saveSettings()">SAVE</button>
    <button class="btn ghost sm" style="margin-top:8px" onclick="exportData()">EXPORT BACKUP (JSON)</button>
    <button class="btn ghost sm" style="margin-top:8px" onclick="importData()">IMPORT BACKUP</button>
    <button class="btn danger sm" style="margin-top:8px" onclick="hardReset()">RESET ALL DATA</button>
    <p class="tiny center" style="margin-top:12px">The System · your data stays on this device (localStorage). Export a backup before switching phones.</p>
  `,'CLOSE');
}
function saveSettings(){
  S.profile.name=$('#s_name').value.trim().toUpperCase()||'HUNTER';
  S.profile.goalWeight=parseFloat($('#s_goal').value)||S.profile.goalWeight;
  S.profile.height=parseInt($('#s_h').value)||S.profile.height;
  S.profile.startDate=$('#s_start').value||S.profile.startDate;
  save(); $('#modal-host').innerHTML=''; render(); toast('Settings saved');
}
function exportData(){
  const blob=new Blob([JSON.stringify(S)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='system-backup-'+todayStr()+'.json'; a.click();
}
function importData(){
  const i=document.createElement('input'); i.type='file'; i.accept='.json';
  i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{try{S=JSON.parse(r.result);save();$('#modal-host').innerHTML='';render();toast('Backup restored');}catch(x){alert('Invalid file');}};r.readAsText(f);};
  i.click();
}
function hardReset(){ if(confirm('Erase ALL progress? This cannot be undone.')){localStorage.removeItem(STORE);S=defaultState();save();$('#modal-host').innerHTML='';S.seenIntro=true;render();} }

/* first-run intro */
function intro(){
  sysModal('NOTIFICATION',
   `<div class="center" style="font-size:34px">⬢</div>
    <div class="sys-big" style="font-size:20px">YOU HAVE BEEN<br>SELECTED AS A PLAYER</div>
    <p>You alone have the right to grow without limit. The System will issue <b>Daily Quests</b> across six domains — body, fuel, conditioning, intellect, work and self.</p>
    <p>Clear them to earn <b style="color:var(--cyan)">EXP</b>, raise your <b style="color:var(--purple)">stats</b>, and spend <b style="color:var(--gold)">gold</b> on rewards you choose.</p>
    <p class="center">Fail the mandatory quests and you enter the <b style="color:var(--red)">penalty zone</b> — your streak resets.</p>
    <p class="center tiny">Read the full plan any time in the <b>CODEX</b> tab.<br>The Ascent begins now, Hunter.</p>`,
   'ACCEPT THE SYSTEM', ()=>{S.seenIntro=true;save();});
}

/* day rollover check */
function rollover(){
  const t=todayStr();
  if(S.lastOpen!==t){ S.lastOpen=t; save(); }
  recomputeFull(); save();
}

/* nav */
document.querySelectorAll('#nav button').forEach(b=>{
  b.onclick=()=>{TAB=b.dataset.t;render();window.scrollTo(0,0);};
});

/* boot */
rollover();
render();
if(!S.seenIntro)intro();

/* service worker */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
