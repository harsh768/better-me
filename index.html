<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0a0b10" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="SYSTEM" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" href="icon-192.png" />
<title>THE SYSTEM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090e; --bg2:#0c0e15; --surface:rgba(255,255,255,0.042); --surface2:rgba(255,255,255,0.062);
  --line:rgba(255,255,255,0.09); --line2:rgba(148,166,255,0.24);
  --accent:#94a6ff; --accent2:#c1a8ff; --accent-d:#5d6ed6;
  --gold:#ecc77e; --green:#7fe6b4; --red:#ff8fa0; --orange:#ffb27a; --teal:#74dcd0;
  --txt:#eef0f7; --txt2:#c4c9db; --muted:#868da4;
  --glow:0 0 0 1px rgba(148,166,255,.16), 0 10px 34px rgba(80,96,200,.20);
  --safe-top:env(safe-area-inset-top); --safe-bot:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:'Sora',-apple-system,system-ui,sans-serif;overscroll-behavior-y:contain;font-size:15px;}
body{min-height:100vh;line-height:1.45;
  background:
   radial-gradient(1000px 560px at 50% -10%, rgba(148,166,255,.13), transparent 62%),
   radial-gradient(760px 460px at 92% 112%, rgba(193,168,255,.10), transparent 60%),
   radial-gradient(600px 600px at 8% 30%, rgba(116,220,208,.04), transparent 60%),
   var(--bg);
  background-attachment:fixed;}
h1,h2,h3,.disp{font-family:'Space Grotesk',sans-serif;letter-spacing:.2px;}
.hidden{display:none !important;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
::-webkit-scrollbar{width:0;height:0;}
.num{font-family:'Space Grotesk',sans-serif;font-variant-numeric:tabular-nums;}

#app{max-width:520px;margin:0 auto;padding:calc(var(--safe-top) + 14px) 16px calc(94px + var(--safe-bot)) 16px;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand .mark{width:26px;height:26px;border-radius:7px;filter:drop-shadow(0 0 5px rgba(141,162,255,.5));}
.brand b{font-family:'Space Grotesk';font-size:14px;letter-spacing:4px;color:#f3f4fa;font-weight:600;}
.icon-btn{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);
  background:var(--surface);display:grid;place-items:center;font-size:17px;color:var(--txt2);}

.panel{position:relative;background:var(--surface);border:1px solid var(--line);
  border-radius:18px;padding:17px;margin-bottom:14px;backdrop-filter:blur(8px);}
.panel-title{font-family:'Space Grotesk';font-size:11px;letter-spacing:2.5px;color:var(--muted);
  text-transform:uppercase;margin:0 0 13px;font-weight:600;display:flex;align-items:center;gap:8px;}
.panel-title .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);}

/* hero */
.hero{background:linear-gradient(150deg, rgba(141,162,255,.10), rgba(183,157,255,.05) 60%, transparent);
  border-color:var(--line2);}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.rankbadge{flex:none;text-align:center;}
.rankbadge .r{font-family:'Space Grotesk';font-weight:700;font-size:26px;line-height:1;
  width:54px;height:54px;border-radius:15px;display:grid;place-items:center;
  border:1px solid var(--line2);color:#fff;background:linear-gradient(160deg, rgba(141,162,255,.28), rgba(183,157,255,.12));
  box-shadow:var(--glow);}
.rankbadge small{font-size:9px;letter-spacing:2px;color:var(--muted);display:block;margin-top:5px;}
.hero-name{font-family:'Space Grotesk';font-size:19px;color:#fff;margin:0;font-weight:600;}
.hero-title{font-size:13px;color:var(--accent);font-weight:500;margin-top:1px;}
.hero-level{font-size:12px;color:var(--muted);margin-top:5px;}
.lvlnum{color:var(--gold);font-weight:600;font-family:'Space Grotesk';}
.xpwrap{margin-top:15px;}
.barlabel{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px;letter-spacing:.5px;}
.bar{height:8px;border-radius:6px;background:rgba(0,0,0,.28);overflow:hidden;position:relative;}
.bar>i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent-d),var(--accent));transition:width .5s cubic-bezier(.2,.8,.2,1);}
.hero-stats{display:flex;gap:9px;margin-top:15px;}
.chip{flex:1;text-align:center;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:13px;padding:10px 4px;}
.chip b{display:block;font-family:'Space Grotesk';font-size:18px;font-weight:600;}
.chip span{font-size:9.5px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;}
.chip.gold b{color:var(--gold);} .chip.streak b{color:var(--orange);} .chip.done b{color:var(--green);}

/* quests */
.q-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.q-progress{font-size:11px;color:var(--muted);letter-spacing:.5px;}
.greet{font-size:12.5px;color:var(--accent2);margin:6px 0 10px;line-height:1.4;}
.quest{display:flex;align-items:flex-start;gap:13px;padding:13px 2px;border-top:1px solid var(--line);}
.quest:first-of-type{border-top:none;}
.qcheck{flex:none;width:25px;height:25px;border-radius:8px;border:1.5px solid var(--line2);
  background:rgba(0,0,0,.2);display:grid;place-items:center;font-size:14px;color:transparent;transition:.18s;margin-top:1px;}
.quest.done .qcheck{background:linear-gradient(150deg,var(--accent),var(--accent2));border-color:transparent;color:#0a0b10;box-shadow:0 4px 14px rgba(141,162,255,.35);}
.qbody{flex:1;min-width:0;}
.qtitle{font-size:15px;font-weight:500;line-height:1.3;}
.quest.done .qtitle{color:var(--muted);text-decoration:line-through;text-decoration-color:rgba(136,143,166,.5);}
.qsub{font-size:12px;color:var(--txt2);margin-top:3px;line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.quest.done .qsub{color:var(--muted);}
.qtags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;align-items:center;}
.tag{font-size:9.5px;letter-spacing:.8px;padding:3px 8px;border-radius:20px;border:1px solid var(--line);color:var(--muted);font-weight:500;}
.tag.xp{color:var(--accent);border-color:var(--line2);}
.tag.gold{color:var(--gold);border-color:rgba(230,193,121,.3);}
.tag.mand{color:var(--red);border-color:rgba(255,143,160,.3);}
.tag.streak{color:var(--orange);border-color:rgba(255,178,122,.4);background:rgba(255,178,122,.08);}
.tag.phase{color:var(--accent2);border-color:rgba(183,157,255,.3);}
.qstreak{display:inline-block;margin-left:7px;font-size:10.5px;font-weight:600;color:var(--orange);font-family:'Space Grotesk';
  padding:1px 7px;border-radius:20px;border:1px solid rgba(255,178,122,.4);background:rgba(255,178,122,.10);vertical-align:middle;}
.qexp{font-size:12.5px;color:var(--txt2);margin-top:10px;line-height:1.55;padding:11px 13px;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:12px;white-space:pre-line;}
.expbtn{font-size:11px;color:var(--accent);margin-top:7px;letter-spacing:.5px;}

/* stat bars */
.statrow{margin-bottom:15px;}
.statrow .barlabel b{color:var(--txt);font-family:'Space Grotesk';font-size:12px;font-weight:600;}
.statrow .barlabel .v{color:var(--accent);font-family:'Space Grotesk';}
.stat-desc{font-size:10.5px;color:var(--muted);margin-top:4px;}
.bar.str>i{background:linear-gradient(90deg,#e08a5a,var(--orange));}
.bar.vit>i{background:linear-gradient(90deg,#d96a78,var(--red));}
.bar.agi>i{background:linear-gradient(90deg,#4fb89a,var(--green));}
.bar.int>i{background:linear-gradient(90deg,var(--accent-d),var(--accent));}
.bar.per>i{background:linear-gradient(90deg,#7d68d6,var(--accent2));}
.bar.sen>i{background:linear-gradient(90deg,#5bb8b0,var(--teal));}
.bar.wlt>i{background:linear-gradient(90deg,#c9a85e,var(--gold));}

/* shop */
.reward{display:flex;align-items:center;gap:13px;padding:13px;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;background:rgba(0,0,0,.16);}
.reward .ic{font-size:22px;width:42px;height:42px;display:grid;place-items:center;border-radius:11px;background:var(--surface2);}
.reward .info{flex:1;min-width:0;}
.reward .rn{font-size:14.5px;font-weight:500;}
.reward .rc{font-size:12px;color:var(--gold);font-family:'Space Grotesk';margin-top:2px;}
.reward .rdays{color:var(--muted);font-size:10.5px;margin-left:6px;}
.rgroup-title{font-size:11px;letter-spacing:.6px;color:var(--accent2);font-weight:600;margin:14px 0 9px;text-transform:uppercase;}
.rgroup-title:first-child{margin-top:4px;}
.redeem{padding:9px 14px;border-radius:11px;font-size:11px;letter-spacing:.5px;font-weight:600;
  border:1px solid var(--line2);color:var(--accent);background:rgba(141,162,255,.08);}
.redeem:disabled{opacity:.35;border-color:var(--line);color:var(--muted);background:none;}
.reward .del{color:var(--red);font-size:16px;padding:4px;opacity:.7;}

/* buttons */
.btn{display:block;width:100%;text-align:center;padding:14px;border-radius:14px;font-family:'Space Grotesk';
  font-size:13px;letter-spacing:.5px;font-weight:600;border:1px solid transparent;color:#0a0b10;
  background:linear-gradient(150deg,var(--accent),var(--accent2));box-shadow:0 6px 20px rgba(141,162,255,.25);}
.btn.ghost{background:var(--surface);color:var(--accent);border-color:var(--line2);box-shadow:none;}
.btn.danger{background:rgba(255,143,160,.08);color:var(--red);border-color:rgba(255,143,160,.3);box-shadow:none;}
.btn.sm{padding:11px;font-size:11px;}

/* money / vault */
.money-hero{text-align:center;background:linear-gradient(150deg, rgba(230,193,121,.10), transparent 70%);border-color:rgba(230,193,121,.2);}
.big-num{font-family:'Space Grotesk';font-size:30px;font-weight:700;margin:4px 0;}
.mgrid{display:flex;gap:9px;margin-top:14px;}
.mcard{flex:1;background:rgba(0,0,0,.2);border:1px solid var(--line);border-radius:13px;padding:11px 8px;text-align:center;}
.mcard b{display:block;font-family:'Space Grotesk';font-size:15px;}
.mcard span{font-size:9.5px;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;}
.catrow{margin-bottom:14px;}
.catrow .cl{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;}
.catrow .cl .cv{font-family:'Space Grotesk';color:var(--txt2);font-size:12px;}
.bar.over>i{background:linear-gradient(90deg,#d96a78,var(--red)) !important;}
.fixed-row{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;border-top:1px solid var(--line);}
.fixed-row:first-child{border-top:none;}
.fixed-row .amt{font-family:'Space Grotesk';color:var(--txt2);}
.fixed-row .sv{color:var(--green);font-size:10px;border:1px solid rgba(127,224,176,.3);border-radius:10px;padding:1px 7px;margin-left:6px;}
.spend-item{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;color:var(--txt2);}
.spend-item .sa{font-family:'Space Grotesk';color:var(--red);}

/* log / calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:6px;}
.cal .dow{text-align:center;font-size:9px;color:var(--muted);letter-spacing:.5px;}
.cell{aspect-ratio:1;border-radius:9px;border:1px solid var(--line);display:grid;place-items:center;
  font-size:10px;color:var(--muted);background:rgba(0,0,0,.14);}
.cell.full{background:linear-gradient(150deg,var(--accent),var(--accent2));color:#0a0b10;border-color:transparent;font-weight:600;}
.cell.partial{background:rgba(183,157,255,.16);border-color:var(--line2);color:var(--txt2);}
.cell.today{outline:1.5px solid var(--gold);outline-offset:1px;}
.wlog{display:flex;gap:9px;margin-top:10px;}
.input,input,select,textarea{width:100%;padding:12px;border-radius:12px;background:rgba(0,0,0,.25);
  border:1px solid var(--line);color:var(--txt);font-family:inherit;font-size:15px;outline:none;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);}
label{font-size:10.5px;color:var(--muted);letter-spacing:1px;display:block;margin:12px 0 5px;text-transform:uppercase;}
.row2{display:flex;gap:10px;} .row2>*{flex:1;}

/* codex */
.codex-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:4px;}
.codex-tabs button{flex:none;padding:9px 14px;border-radius:22px;font-size:11px;letter-spacing:.5px;font-weight:600;
  border:1px solid var(--line);color:var(--muted);background:var(--surface);}
.codex-tabs button.active{color:#0a0b10;background:linear-gradient(150deg,var(--accent),var(--accent2));border-color:transparent;}
.cx h4{font-family:'Space Grotesk';font-size:14px;color:var(--txt);margin:18px 0 8px;font-weight:600;}
.cx h4:first-child{margin-top:2px;}
.cx p,.cx li{font-size:13.5px;line-height:1.6;color:var(--txt2);}
.cx ul,.cx ol{margin:6px 0;padding-left:19px;} .cx li{margin-bottom:5px;}
.cx b{color:var(--txt);font-weight:600;} .cx .hl{color:var(--gold);}
.cx .note{font-size:12px;color:var(--txt2);background:rgba(255,143,160,.06);border:1px solid rgba(255,143,160,.2);border-radius:12px;padding:11px 13px;margin:11px 0;}
.cx table{width:100%;border-collapse:collapse;margin:9px 0;font-size:12.5px;}
.cx td,.cx th{border:1px solid var(--line);padding:7px 9px;text-align:left;}
.cx th{color:var(--accent);font-family:'Space Grotesk';font-size:10px;letter-spacing:.5px;font-weight:600;}

/* nav */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;justify-content:center;
  padding-bottom:var(--safe-bot);background:linear-gradient(180deg,transparent,var(--bg) 40%);}
.nav-inner{display:flex;width:100%;max-width:520px;margin:0 14px 12px;background:rgba(16,18,26,.86);
  border:1px solid var(--line);border-radius:20px;backdrop-filter:blur(16px);padding:5px;box-shadow:0 8px 30px rgba(0,0,0,.4);}
.nav button{flex:1;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);border-radius:14px;}
.nav button .ni{font-size:17px;line-height:1;}
.nav button .nl{font-size:8.5px;letter-spacing:.5px;font-weight:600;}
.nav button{transition:transform .15s ease,color .15s ease;}
.nav button:active{transform:scale(.92);}
.nav button.active{color:#0a0b10;background:linear-gradient(150deg,var(--accent),var(--accent2));box-shadow:0 4px 16px rgba(141,162,255,.32);}
.nav button.active .nl{color:#0a0b10;opacity:.85;}

/* modal */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(5,6,12,.7);backdrop-filter:blur(6px);
  display:grid;place-items:center;padding:20px;animation:fade .2s;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sys{width:100%;max-width:430px;border:1px solid var(--line2);border-radius:22px;
  background:linear-gradient(170deg,#13151f,#0d0e15);box-shadow:0 20px 60px rgba(0,0,0,.55);
  padding:22px;animation:pop .28s cubic-bezier(.2,1.1,.4,1);max-height:88vh;overflow-y:auto;}
@keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.sys-h{font-family:'Space Grotesk';text-align:center;color:var(--accent);letter-spacing:3px;font-size:11px;
  font-weight:600;border-bottom:1px solid var(--line);padding-bottom:13px;margin-bottom:16px;}
.sys-big{font-family:'Space Grotesk';font-size:24px;text-align:center;color:#fff;margin:10px 0;font-weight:700;}
.sys p{font-size:14px;line-height:1.6;color:var(--txt2);}
.center{text-align:center;}
.notif{position:fixed;left:50%;top:calc(var(--safe-top) + 16px);transform:translateX(-50%);z-index:120;
  background:rgba(19,21,31,.96);border:1px solid var(--line2);border-radius:14px;padding:11px 18px;
  box-shadow:0 8px 30px rgba(0,0,0,.4);font-family:'Space Grotesk';font-size:12px;letter-spacing:.5px;color:var(--accent);
  font-weight:600;animation:drop .35s;max-width:90vw;}
@keyframes drop{from{transform:translate(-50%,-24px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:14px;}
.tiny{font-size:11.5px;color:var(--muted);line-height:1.5;}
.catbtn{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.catbtn button{padding:9px 13px;border-radius:11px;border:1px solid var(--line);font-size:12.5px;color:var(--txt2);background:var(--surface);}
.catbtn button.sel{border-color:var(--accent);color:var(--accent);background:rgba(141,162,255,.1);}
.legend{display:flex;flex-direction:column;gap:8px;}
.leg{display:flex;align-items:center;gap:10px;font-size:13.5px;}
.leg .sw{width:11px;height:11px;border-radius:3px;flex:none;}
.leg .lk{flex:1;color:var(--txt2);}
.leg .lv{color:var(--muted);font-size:12px;}
.cx li b{color:var(--accent);}
.reslink{display:inline-block;margin-top:9px;color:var(--accent);border:1px solid var(--line2);border-radius:10px;padding:7px 12px;font-size:12px;text-decoration:none;font-weight:600;}
.reslink:active{background:rgba(141,162,255,.12);}
.til-row{display:flex;gap:11px;padding:9px 0;border-top:1px solid var(--line);}
.til-row:first-child{border-top:none;}
.til-row .td{flex:none;width:68px;font-size:11px;color:var(--muted);padding-top:1px;}
.til-row .tt{flex:1;font-size:13px;color:var(--txt2);line-height:1.45;}
textarea{line-height:1.45;}

/* ---- daily progress ring (gamified) ---- */
.ring{position:relative;width:46px;height:46px;border-radius:50%;flex:none;
  background:conic-gradient(var(--accent) calc(var(--p)*3.6deg), rgba(255,255,255,.08) 0);
  transition:background .55s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 0 1px rgba(255,255,255,.04) inset;}
.ring.full{background:conic-gradient(var(--green) 360deg, var(--green) 0);box-shadow:0 0 14px rgba(127,230,180,.4);}
.ring-in{position:absolute;inset:4px;border-radius:50%;background:#0c0e15;display:grid;place-items:center;
  font-family:'Space Grotesk';font-size:11px;font-weight:600;color:var(--txt);letter-spacing:.3px;}
.ring.full .ring-in{color:var(--green);}

/* ---- weight panel ---- */
.wgrid{display:flex;gap:9px;margin:2px 0 13px;}
.wcard{flex:1;background:rgba(0,0,0,.2);border:1px solid var(--line);border-radius:14px;padding:12px 6px;text-align:center;}
.wcard b{display:block;font-family:'Space Grotesk';font-size:18px;line-height:1.1;}
.wcard span{font-size:9px;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;display:block;margin-top:4px;line-height:1.3;}
.wbar-line{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:6px;font-family:'Space Grotesk';}
.wpill-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
.wpill{font-size:11px;color:var(--txt2);background:rgba(0,0,0,.2);border:1px solid var(--line);border-radius:20px;padding:4px 11px;}
.wpill b{font-family:'Space Grotesk';}

/* ---- gamified micro-interactions ---- */
.qcheck:active{transform:scale(.86);}
.quest.done .qcheck{animation:pop .3s cubic-bezier(.2,1.4,.4,1);}
.chip b{background:linear-gradient(180deg,#fff,rgba(255,255,255,.72));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.chip.gold b{background:linear-gradient(180deg,#f5d98f,#d9aa54);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.chip.streak b{background:linear-gradient(180deg,#ffc79a,#ff9b63);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.chip.done b{background:linear-gradient(180deg,#a6f0cf,#6fdcaa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.xpwrap .bar>i{position:relative;overflow:hidden;}

function buildCurriculum(){const f=[];CURR_GROUPS.forEach(g=>g.items.forEach(it=>f.push({phase:g.phase,topic:g.topic,res:g.res,task:it})));return f;}
const CURRICULUM=buildCurriculum();
function studyIndexFor(){
  const start=parseD(S.profile.startDate), t=parseD(todayStr());
  let idx=0; const d=new Date(start);
  while(d<t){ if(d.getDay()!==0) idx++; d.setDate(d.getDate()+1); }
  return idx;
}
function studyMins(w){ if(w<=4)return [60,75,90,105][Math.min(w-1,3)]; return Math.min(75+(w-5)*5,120); }
function studyToday(){
  if(dow()===0) return {id:'study',title:'Weekly Review & Plan',sub:'Sunday reset — re-read learnings, log weight, plan the week.',
    stat:'INT',xp:50,gold:40,mand:true,key:true,phaseTag:'REVIEW',
    exp:`Sunday reset:\n• Re-read this week's "today I learned" notes — feel the progress.\n• Pick next week's study target.\n• Log your weight (LOG tab).\n• Review the VAULT — did you stay on budget?\n• Plan dates/quality time with your GF.\n• 30-60 min on a startup idea if you want.`};
  const w=programWeek(), mins=studyMins(w), i=studyIndexFor();
  const unit = i<CURRICULUM.length ? CURRICULUM[i] : ENDGAME[(i-CURRICULUM.length)%ENDGAME.length];
  return {id:'study', title:'Study · '+unit.topic, sub:unit.task, stat:'INT', xp:65, gold:50, mand:true, key:true, phaseTag:unit.phase, resUrl:resUrl(unit.res),
    exp:`${unit.task}\n\n📚 Where: tap "Open resource" below — it teaches this topic from zero.\n⏱ Today: ~${mins} min.\n\n🆕 New terms are EXPECTED — don't be intimidated. Flow: read the short material first → do the lab/exercise hands-on → jot a one-line TIL note (Home). Stuck >15 min? Read the lab's solution, understand it, move on.\nThat daily loop is the cure for "I don't know anything" — 90 days = 90 receipts.`};
}

function streakInfo(){

    if(prev&&daysBetween(prev,ds)===1&&dayCounts(S.history[prev]))run++;else run=1;

/* ---------- weight model ----------
   Daily weight bounces ±0.5–1 kg from water/food/salt, so a single reading is noise.
   We denoise into a "trend" (avg of the last few logs) and derive the numbers that
   actually matter: total lost, weekly rate, % to goal, and an ETA. */
function weightStats(){
  const ws=S.weights.slice().sort((a,b)=>a.date<b.date?-1:1);
  const goal=S.profile.goalWeight;
  if(!ws.length)return{has:false,goal,start:null,cur:null,last:null,trend:null,lost:0,toGoal:null,pct:0,rate:0,etaWeeks:null,count:0};
  const start=ws[0].kg,last=ws[ws.length-1].kg;
  const recent=ws.slice(-5).map(w=>w.kg);
  const trend=+(recent.reduce((a,b)=>a+b,0)/recent.length).toFixed(1); // denoised "current"
  const lost=+(start-trend).toFixed(1);
  const toGoal=+(trend-goal).toFixed(1);
  const totalToLose=Math.max(0.1,start-goal);
  const pct=Math.max(0,Math.min(100,Math.round((start-trend)/totalToLose*100)));
  let rate=0,etaWeeks=null;
  if(ws.length>=2){
    const span=Math.max(1,daysBetween(ws[0].date,ws[ws.length-1].date));
    rate=+((start-last)/span*7).toFixed(2); // kg/week, positive = losing
    if(rate>0.05&&toGoal>0)etaWeeks=Math.ceil(toGoal/rate);
  }
  return{has:true,goal,start,last,trend,cur:trend,lost,toGoal,pct,rate,etaWeeks,count:ws.length};
}

  c.width=w*dpr;c.height=h*dpr;const x=c.getContext('2d');x.scale(dpr,dpr);

  const cx=w/2,cy=h/2,R=Math.min(w,h)/2-30,ang=i=>-Math.PI/2+i*2*Math.PI/n;
  for(let r=1;r<=4;r++){x.strokeStyle='rgba(255,255,255,0.07)';x.lineWidth=1;x.beginPath();
    for(let i=0;i<=n;i++){const a=ang(i%n),rr=R*r/4,px=cx+Math.cos(a)*rr,py=cy+Math.sin(a)*rr;i?x.lineTo(px,py):x.moveTo(px,py);}x.stroke();}
  for(let i=0;i<n;i++){const a=ang(i);x.strokeStyle='rgba(255,255,255,0.05)';x.beginPath();x.moveTo(cx,cy);x.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);x.stroke();}
  x.beginPath();for(let i=0;i<=n;i++){const a=ang(i%n),rr=R*(vals[i%n]/max),px=cx+Math.cos(a)*rr,py=cy+Math.sin(a)*rr;i?x.lineTo(px,py):x.moveTo(px,py);}x.closePath();
  const g=x.createLinearGradient(0,0,w,h);g.addColorStop(0,'rgba(142,162,255,0.42)');g.addColorStop(1,'rgba(183,157,255,0.3)');
  x.fillStyle=g;x.fill();x.strokeStyle='#8ea2ff';x.lineWidth=2;x.stroke();
  x.fillStyle='#b79dff';for(let i=0;i<n;i++){const a=ang(i),rr=R*(vals[i]/max);x.beginPath();x.arc(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr,2.6,0,7);x.fill();}
  x.textAlign='center';x.textBaseline='middle';
  for(let i=0;i<n;i++){const a=ang(i),lx=cx+Math.cos(a)*(R+17),ly=cy+Math.sin(a)*(R+17);
    x.fillStyle='#c3c8da';x.font='600 10px Space Grotesk';x.fillText(keys[i],lx,ly-5);
    x.fillStyle=vals[i]>=70?'#7fe0b0':vals[i]>=40?'#9097ab':'#ff8fa0';x.font='600 9px Space Grotesk';x.fillText(vals[i]+'%',lx,ly+6);}
}
function drawActivity(){
  const c=$('#activity');if(!c||!c.clientWidth)return;
  const dpr=window.devicePixelRatio||1,w=c.clientWidth,h=90;
  c.width=w*dpr;c.height=h*dpr;const x=c.getContext('2d');x.scale(dpr,dpr);
  const days=[];const d=new Date();d.setDate(d.getDate()-13);
  for(let i=0;i<14;i++){const dd=new Date(d);dd.setDate(d.getDate()+i);const ds=dstr(dd);days.push({ds,xp:dayXp(S.history[ds]),full:dayCounts(S.history[ds])});}
  const max=Math.max(60,...days.map(o=>o.xp)),gap=4,bw=(w-13*gap)/14;
  days.forEach((o,i)=>{const bh=Math.max(2,o.xp/max*(h-16)),px=i*(bw+gap);
    x.fillStyle=o.full?'#8ea2ff':'rgba(142,162,255,0.35)';roundRect(x,px,h-bh,bw,bh,3);x.fill();});
}
const PAL=['#8ea2ff','#b79dff','#7fe0b0','#e6c179','#ff8fa0','#74dcd0','#ffb27a','#ff9bd0'];
function drawDonut(){
  const c=$('#donut');if(!c||!c.clientWidth)return;
  const f=financeSummary(monthKey()),entries=Object.entries(f.byCat).filter(([k,v])=>v>0);
  const dpr=window.devicePixelRatio||1,w=c.clientWidth,h=c.clientWidth;
  c.width=w*dpr;c.height=h*dpr;const x=c.getContext('2d');x.scale(dpr,dpr);
  const total=entries.reduce((a,[,v])=>a+v,0);if(!total)return;
  const cx=w/2,cy=h/2,R=Math.min(w,h)/2-4,r=R*0.62;let a0=-Math.PI/2;
  entries.forEach(([k,v],i)=>{const a1=a0+v/total*2*Math.PI;x.beginPath();x.moveTo(cx,cy);x.arc(cx,cy,R,a0,a1);x.closePath();x.fillStyle=PAL[i%PAL.length];x.fill();a0=a1;});
  x.globalCompositeOperation='destination-out';x.beginPath();x.arc(cx,cy,r,0,7);x.fill();x.globalCompositeOperation='source-over';
  x.fillStyle='#eceef5';x.font='700 17px Space Grotesk';x.textAlign='center';x.textBaseline='middle';
  x.fillText(total>=1000?'₹'+(total/1000).toFixed(total>=10000?0:1)+'k':'₹'+total,cx,cy-3);
  x.fillStyle='#888fa6';x.font='600 9px Space Grotesk';x.fillText('SPENT',cx,cy+13);
}

function activeFixed(mk){return S.finance.fixed.filter(f=>(!f.from||f.from<=mk)&&(!f.until||mk<=f.until));}
function financeSummary(mk){
  const af=activeFixed(mk);
  const fixedExp=af.filter(f=>f.type==='expense').reduce((a,b)=>a+b.amt,0);
  const fixedSav=af.filter(f=>f.type==='savings').reduce((a,b)=>a+b.amt,0);
  const invest=S.finance.investTarget||0;
  const spendable=S.finance.income-fixedExp-fixedSav-invest;
  const spends=S.finance.spends[mk]||[];
  const spentTotal=spends.reduce((a,b)=>a+b.amt,0);
  const byCat={};S.finance.budgets.forEach(b=>byCat[b.cat]=0);
  spends.forEach(s=>byCat[s.cat]=(byCat[s.cat]||0)+s.amt);
  const targetSav=fixedSav+invest;
  const overspend=Math.max(0,spentTotal-spendable);
  const projected=targetSav-overspend; // your plan, only drops if you blow past the spendable budget
  return{af,fixedExp,fixedSav,invest,spendable,spends,spentTotal,byCat,projected,targetSav};
}

function drawWeightChart(){
  const c=$('#wchart');if(!c)return;const dpr=window.devicePixelRatio||1,w=c.clientWidth,h=120;
  c.width=w*dpr;c.height=h*dpr;const x=c.getContext('2d');x.scale(dpr,dpr);
  const data=S.weights.slice(-30),goal=S.profile.goalWeight;
  if(!data.length){x.fillStyle='#868da4';x.font='12px Sora';x.textAlign='center';x.fillText('Log your weight to see the trend.',w/2,h/2);return;}
  const ys=data.map(d=>d.kg).concat([goal]);let mn=Math.min(...ys)-1,mx=Math.max(...ys)+1;if(mx-mn<2){mx+=1;mn-=1;}
  const px=i=>data.length<2?w/2:10+i*(w-20)/(data.length-1),py=v=>12+(mx-v)/(mx-mn)*(h-24);
  // goal line + label
  x.strokeStyle='rgba(236,199,126,.55)';x.setLineDash([5,4]);x.lineWidth=1;x.beginPath();x.moveTo(0,py(goal));x.lineTo(w,py(goal));x.stroke();x.setLineDash([]);
  x.fillStyle='rgba(236,199,126,.9)';x.font='600 9px Space Grotesk';x.textAlign='left';x.fillText('goal '+goal,4,py(goal)-4);
  // gradient area under the line
  if(data.length>1){const g=x.createLinearGradient(0,0,0,h);g.addColorStop(0,'rgba(142,162,255,.30)');g.addColorStop(1,'rgba(142,162,255,0)');
    x.beginPath();x.moveTo(px(0),py(data[0].kg));data.forEach((d,i)=>x.lineTo(px(i),py(d.kg)));x.lineTo(px(data.length-1),h);x.lineTo(px(0),h);x.closePath();x.fillStyle=g;x.fill();}
  // trend line
  x.strokeStyle='#8ea2ff';x.lineWidth=2.4;x.lineJoin='round';x.beginPath();data.forEach((d,i)=>{i?x.lineTo(px(i),py(d.kg)):x.moveTo(px(i),py(d.kg));});x.stroke();
  // points, last one highlighted
  data.forEach((d,i)=>{const lp=i===data.length-1;x.beginPath();x.arc(px(i),py(d.kg),lp?4:2.4,0,7);x.fillStyle=lp?'#fff':'#8ea2ff';x.fill();if(lp){x.strokeStyle='#8ea2ff';x.lineWidth=2;x.stroke();}});
}

<p>Full Push / Pull / Legs with progression — by now the shoulder is rebuilt. This is where the aesthetic shape (shoulders, back, arms) fills in.</p>
<h4>Three rules that beat everything</h4>
<ul><li><b>Progressive overload:</b> add a little weight or 1–2 reps when a set feels easy. That's how a beginner grows fastest.</li>
<li><b>Abs = low body fat + core work.</b> The crunches/leg-raises build the muscle; the deficit (below) uncovers it. They'll show in the high-70s kg for you.</li>
<li><b>10k steps daily</b> — zero shoulder cost, the biggest fat-loss lever.</li></ul>
<p class="note">Always clear new movements with your physio. Sharp pain = stop. Never trade form for weight as a beginner.</p>
<h4>📖 Exercise Guide — how to do each move</h4>
<p>New to the gym? Here's every movement in your current plan in one line, with a demo video. Watch each once and you're set.</p>
${exGuideHTML()}`,

nutri:`<h4>Nutrition — Lean Down (Egg + Veg)</h4>
<p>At ~90 kg / 6 ft, a firm deficit melts fat fast. Target <b>~0.75 kg/week</b> (you can run ~1 kg/week early while heavier) to be visibly fitter by your <b class="hl">14 Sep birthday</b> — without crashing your energy or the shoulder's healing.</p>
<table><tr><th>Target</th><th>Value</th></tr>
<tr><td>Calories</td><td>~1,700–1,900 kcal/day (~750 kcal deficit)</td></tr>
<tr><td>Protein</td><td>~160 g/day</td></tr>
<tr><td>Water</td><td>3 L/day</td></tr></table>
<p>Your two-meal pattern (12:30 + 9) is basically intermittent fasting — great for a deficit. Make both meals protein-forward.</p>
<h4>Protein (egg + veg)</h4>
<p>Eggs & whites, paneer, tofu, Greek yogurt/curd, dal, rajma, chana, <b>soya chunks</b> (protein bomb), milk, whey. A whey scoop + soya makes 160 g easy. High protein in a deficit is what keeps your muscle (and the lean look) while the fat drops.</p>
<h4>Plate rule (no counting to start)</h4>
<ul><li>½ plate veg/salad · ¼ protein · ¼ carbs (measured roti/rice).</li>
<li>Protein at <b>every</b> meal. Limit fried food, sweets, sugary drinks, late snacking.</li>
<li>One earned cheat meal/week (buy it with gold — you have to work it off first).</li></ul>
<h4>Abs note</h4>
<p>You can't out-train a bad diet — abs are revealed in the kitchen. Stay in the deficit, hit protein, and your core work + steps do the rest. Expect them to appear as you drop into the high-70s kg.</p>
<h4>Sample day (~1,850 kcal · ~160 g protein)</h4>
<ul><li><b>12:30:</b> 3 eggs + 100 g paneer bhurji, 2 roti, big salad, bowl of curd.</li>
<li><b>Snack:</b> whey shake + handful of nuts.</li>
<li><b>9 pm:</b> 150 g soya/paneer or 4-egg dish + dal + 1 cup rice/2 roti + sabzi.</li></ul>
<p class="note">If the scale isn't trending down over 2 weeks, trim carbs/oil slightly. If exhausted, add protein/veg — never sugar.</p>`,

recover:`<h4>Recovery — where results actually happen</h4>
<h4>Shoulder physio</h4>
<ul><li>Do your physio's routine <b>1–2×/day</b> (a core quest).</li>
<li>Early-stage (only as cleared): pendulums, isometrics, assisted ROM → light band external rotation.</li>
<li><b>Never push into sharp pain.</b> Consistency &gt; intensity. This is your fastest road back to heavy lifting.</li></ul>
<h4>Sleep — the cheat code</h4>
<p>From ~2–3 am, we shift bedtime <b>~20 min earlier weekly</b> toward 12:30 am / 8 am wake. The Home sleep quest shows this week's target.</p>
<ul><li>No screens 30 min before bed (night-skincare is your wind-down cue).</li>
<li>Dark, cool room. Same wake time daily — even weekends.</li>
<li>Sleep drives shoulder healing, fat-loss hormones, focus and mood. Non-negotiable.</li></ul>`,

skin:`<h4>Skincare — simple, daily, high-ROI</h4>
<p>A routine you control compounds into visible confidence. Keep it minimal so you actually stick to it.</p>
<h4>Morning</h4>
<ol><li>Gentle cleanser</li><li>Lightweight moisturiser</li><li><b>Sunscreen SPF 50</b> — the single best thing for your skin, daily.</li></ol>
<h4>Night</h4>
<ol><li>Cleanser</li><li>Treatment <i>(add after 2–3 weeks):</i> niacinamide serum + a gentle retinoid 2–3 nights/week</li><li>Moisturiser</li></ol>
<h4>Basics that matter most</h4>
<ul><li>Don't pick. Clean pillowcase weekly. Hydrate (your 3 L quest).</li>
<li>Sleep + less sugar visibly improve skin — your other quests do double duty here.</li></ul>`,

study:`<h4>Study Path — the cure for "I don't know anything"</h4>
<p>The Home study quest shows your <b>exact task every day</b> and advances through a full ~1-year curriculum. Sundays are review/plan days.</p>
<h4>Phase 1 · Month 1 — OSCP (use the live lab!)</h4>
<p>You paid for it; ~1 month of lab access remains. That access is the expensive part — extract maximum value. You likely won't sit the exam this month, and that's fine: the goal is <b>burning through labs + building methodology</b>. Daily loop: full nmap → enum → foothold → shell → privesc (Linux & Windows) → loot, with detailed per-box notes. Areas march in order: recon → enumeration → web footholds → exploitation → buffer overflow → privesc → passwords/pivoting/AD → lab boxes. If you fall for it, extend the sub later and target the exam (~2–3 focused months).</p>
<h4>Phase 2 · Months 2+ — Bug Bounty + AI Security (free, high-leverage)</h4>
<ul><li><b>PortSwigger Web Security Academy</b> — every topic in order (SQLi → auth → access control → XSS → SSRF → deserialization → SSTI → request smuggling → OAuth → JWT → API → GraphQL → race conditions → …). Do the labs, don't just read.</li>
<li><b>Recon + real hunting:</b> subdomain enum, content discovery, Burp; hunt public HackerOne/Bugcrowd programs; read disclosed reports.</li>
<li><b>AI / LLM security (your edge):</b> OWASP LLM Top 10, prompt injection (direct + indirect), jailbreaks, insecure output handling, agent/tool abuse, RAG leakage. A fast-growing niche where you can stand out at Navi and in bounties.</li></ul>
<h4>Applied months — hunting for real</h4>
<p>Once you've worked through the structured curriculum (go at your own depth — a hard lab can take more than a day), the study quest rotates through real practitioner work: recon sweeps, focused hunts, reading disclosed reports, AI red-teaming, CTFs, automation, and report writing. That rotation <i>is</i> how a working bug-bounty hunter spends their days — so every day of the year still hands you a concrete task.</p>
<p class="note">The one habit that beats talent: write ONE "today I learned" note every single day. 90 days → 90 concrete proofs you didn't have before.</p>`,

money:`<h4>Money — Bangalore, ₹2.5L/month</h4>
<p>Good income. The leaks are lifestyle creep, food delivery, impulse buys and unplanned dates. The VAULT tab tracks it; here's the plan it's built on.</p>
<h4>Monthly map (Jul–Dec 2026 — tightest)</h4>
<table><tr><th>Item</th><th>₹</th></tr>
<tr><td>Income</td><td>2,50,000</td></tr>
<tr><td>Rent</td><td>25,000</td></tr>
<tr><td>Car EMI</td><td>35,000</td></tr>
<tr><td>Petrol</td><td>12,000</td></tr>
<tr><td>Personal loan EMI (till Dec)</td><td>10,000</td></tr>
<tr><td>Phone EMI (Jul–Dec)</td><td>17,000</td></tr>
<tr><td><b>Fixed expenses</b></td><td><b>99,000</b></td></tr>
<tr><td>Joint savings (GF)</td><td>30,000</td></tr>
<tr><td>Mom savings</td><td>15,000</td></tr>
<tr><td><b>Auto-savings</b></td><td><b>45,000</b></td></tr>
<tr><td>Investment target</td><td>55,000</td></tr>
<tr><td><b>Spendable on life</b></td><td><b>51,000</b></td></tr></table>
<h4>The ₹51k "spendable" split</h4>
<ul><li>Food & groceries — 17k</li><li>Dates & outings — 18k</li><li>Shopping & personal — 8k</li><li>Misc & buffer — 8k</li></ul>
<p>Total saved/invested = 45k + 55k = <b class="hl">₹1,00,000/month (~40%)</b>. Strong but realistic — tightened dates/food a little vs the easy version, and the reward Shop now gates extra splurges behind earned gold so you don't overspend.</p>
<h4>After December — the jump</h4>
<p>Personal loan (10k) and phone EMI (17k) <b>both end in Dec 2026</b> → ₹27k/month freed. Redirect ALL of it to investments → invest ~₹82k, total savings ~₹1.27L/mo, rate <b class="hl">~51%</b> — without changing your lifestyle. (Bump "investment target" in the VAULT then.)</p>
<h4>Where to put the ₹50k+ invest</h4>
<ul><li>Build a 6-month <b>emergency fund</b> first (liquid fund / sweep FD) ≈ ₹6L.</li>
<li>Then SIPs into index funds (Nifty 50 + maybe a flexicap), and use your <b>80C</b> (ELSS/PPF) for tax.</li>
<li>Keep the joint + mom transfers — they're already great habits.</li></ul>
<h4>The habits that actually move it</h4>
<ul><li><b>Log every spend</b> (daily quest). Awareness alone cuts ~15%.</li>
<li><b>24-hour rule</b> on any non-essential buy.</li>
<li><b>Automate</b> SIP + savings on salary day so you save before you spend.</li>
<li>Dates: alternate big spends with cheap-but-thoughtful ones — she'll value effort over cost.</li></ul>
<p class="note">Not financial advice — a sensible default. Adjust amounts in VAULT → Edit. Talk to a fee-only advisor before big moves.</p>`,

work:`<h4>Work & Mind — best security engineer</h4>
<h4>At the job</h4>
<ul><li><b>One deep-work block daily</b> (60–90 min, phone away) on your hardest task. Reputation is built here.</li>
<li><b>Log 1 learning daily.</b> Over a quarter it's a visible body of work — bring it to 1:1s/reviews.</li>
<li>Connect study to work: offer to help with internal pentests, threat modeling, or <b>AI-feature security reviews</b> (your growing edge).</li>
<li>Volunteer for the occasional scary task. Growth lives just past "not sure I can."</li></ul>
<h4>Confidence</h4>
<ul><li>"I don't know anything" is impostor feeling, not fact. The fix is <b>evidence</b>: stats rising, streaks, learning notes, weight down, savings up. This app makes that evidence daily.</li></ul>
<h4>Relationship & balance</h4>
<ul><li>Protect <b>quality time</b> with your GF — schedule it like a quest. Presence &gt; spend.</li>
<li>The Sunday review includes a quick "plan time together" prompt so it never gets crowded out.</li></ul>
<h4>Startup / exploration</h4>
<ul><li>Keep it a <b>weekly Sunday slot</b>. Jot ideas, build tiny prototypes, talk to people. Security + AI is a great founder lane — your study doubles as market research. Don't let it crowd out the fundamentals you're compounding now.</li></ul>`,

/* ============================================================ MODALS */
function sysModal(head,html,btn='OK',onClose){
  $('#modal-host').innerHTML=`<div class="overlay" id="ov"><div class="sys"><div class="sys-h">SYSTEM · ${head}</div>${html}<button class="btn" style="margin-top:16px" id="ovbtn">${btn}</button></div></div>`;
  $('#ovbtn').onclick=()=>{$('#modal-host').innerHTML='';if(onClose)onClose();};
}
function levelUpMsg(l){
  sysModal('NOTIFICATION',`<div class="center" style="color:var(--gold);letter-spacing:4px;font-family:Space Grotesk;font-size:11px;font-weight:600">⟨ LEVEL UP ⟩</div>
   <div class="sys-big">LEVEL ${l}</div><p class="center">Rank <b style="color:var(--accent)">${rankFor(l)}</b> · ${titleFor(l)}<br>You've grown stronger. The path continues.</p>`,'CONTINUE');
  if(navigator.vibrate)navigator.vibrate([30,60,30,60,80]);
}
function toast(msg){const h=$('#notif-host');const el=document.createElement('div');el.className='notif';el.textContent='◆ '+msg;h.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .4s';},1200);setTimeout(()=>el.remove(),1650);}
function openSettings(){const p=S.profile;
  sysModal('SETTINGS',`<label>Hunter name</label><input id="s_name" value="${p.name||''}">
    <div class="row2"><div><label>Goal weight (kg)</label><input id="s_goal" type="number" value="${p.goalWeight}"></div>
    <div><label>Height (cm)</label><input id="s_h" type="number" value="${p.height}"></div></div>
    <div class="row2"><div><label>Program start</label><input id="s_start" type="date" value="${p.startDate}"></div>
    <div><label>Birthday (milestone)</label><input id="s_bday" type="date" value="${p.bday||'2026-09-14'}"></div></div>
    <p class="tiny" style="margin-top:6px">Week ${programWeek()} · ${currentPhaseLetter()==='A'?'Heal phase':currentPhaseLetter()==='B'?'Reintroduction phase':'Full-training phase'}. Workout split & study units advance from the start date.</p>
    <button class="btn" style="margin-top:14px" onclick="saveSettings()">SAVE</button>
    <button class="btn ghost sm" style="margin-top:8px" onclick="exportData()">EXPORT BACKUP (JSON)</button>
    <button class="btn ghost sm" style="margin-top:8px" onclick="importData()">IMPORT BACKUP</button>
    <button class="btn danger sm" style="margin-top:8px" onclick="hardReset()">RESET ALL DATA</button>
    <button class="btn ghost sm" style="margin-top:8px" onclick="forceUpdate()">⟳ CHECK FOR UPDATES</button>
    <p class="tiny center" style="margin-top:12px">Your data lives only on this device. Export before switching phones.<br>The System · v${APP_VERSION}</p>`,'CLOSE');}
function saveSettings(){S.profile.name=$('#s_name').value.trim().toUpperCase()||'HUNTER';
  S.profile.goalWeight=parseFloat($('#s_goal').value)||S.profile.goalWeight;S.profile.height=parseInt($('#s_h').value)||S.profile.height;
  S.profile.startDate=$('#s_start').value||S.profile.startDate;
  S.profile.bday=$('#s_bday').value||S.profile.bday;save();$('#modal-host').innerHTML='';render();toast('Settings saved');}
function exportData(){const b=new Blob([JSON.stringify(S)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='system-backup-'+todayStr()+'.json';a.click();}
function importData(){const i=document.createElement('input');i.type='file';i.accept='.json';
  i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{S=migrate(JSON.parse(r.result));save();$('#modal-host').innerHTML='';render();toast('Backup restored');}catch(x){alert('Invalid file');}};r.readAsText(f);};i.click();}
function hardReset(){if(confirm('Erase ALL progress? This cannot be undone.')){localStorage.removeItem(STORE);S=defaultState();S.seenIntro=true;save();$('#modal-host').innerHTML='';render();}}

function intro(){sysModal('NOTIFICATION',
  `<div class="center" style="font-size:30px">◇</div><div class="sys-big" style="font-size:19px">YOU HAVE BEEN<br>SELECTED AS A PLAYER</div>
   <p>You alone may grow without limit. The System issues <b>Daily Quests</b> across body, fuel, conditioning, intellect, work, self & wealth.</p>
   <p>Clear them for <b style="color:var(--accent)">EXP</b>, raise your <b style="color:var(--accent2)">stats</b>, and earn <b style="color:var(--gold)">gold</b> for rewards you choose.</p>
   <p class="center">Each day gives your <b>exact</b> workout & study task. Keep your streak alive by clearing just <b>3 🔥 keystones</b> daily: Protein · Steps · Study.</p>
   <p class="center tiny">The full plan lives in the <b>CODEX</b> tab. The Ascent begins now, Hunter.</p>`,
  'ACCEPT THE SYSTEM',()=>{S.seenIntro=true;save();});}

function rollover(){const t=todayStr();if(S.lastOpen!==t){S.lastOpen=t;}recomputeFull();save();}
document.querySelectorAll('#nav button').forEach(b=>{b.onclick=()=>{TAB=b.dataset.t;render();window.scrollTo(0,0);};});
rollover();render();
if(!S.seenIntro)intro();
else if(dow()===0&&S.lastRecap!==todayStr()&&Object.keys(S.history).length>0){S.lastRecap=todayStr();save();showRecap();}
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').then(reg=>{reg.update();setInterval(()=>reg.update(),60000);}).catch(()=>{});});
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{if(refreshing)return;refreshing=true;location.reload();});
}
</script>
</body>
</html>
